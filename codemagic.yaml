# ============================================================
# CHORIFY — Codemagic CI/CD
# ============================================================
# Pipeline :
#   1. Push sur GitHub (main ou dev)
#   2. Build automatique via Codemagic
#   3. Génération APK / IPA
# ============================================================

workflows:
  # --- Build Android (APK) ---
  android-build:
    name: Chorify Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      groups:
        - supabase  # Variables : EXPO_PUBLIC_SUPABASE_URL, EXPO_PUBLIC_SUPABASE_ANON_KEY
      vars:
        EXPO_NO_TELEMETRY: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: dev
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: TypeScript check
        script: |
          npx tsc --noEmit
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Build APK (Debug)
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true

  # --- Build iOS (Simulator) ---
  ios-build:
    name: Chorify iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      groups:
        - supabase
      vars:
        EXPO_NO_TELEMETRY: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: TypeScript check
        script: |
          npx tsc --noEmit
      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for Simulator
        script: |
          cd ios
          xcodebuild -workspace Chorify.xcworkspace \
            -scheme Chorify \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true
