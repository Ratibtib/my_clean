# ============================================================
# CHORIFY — Codemagic CI/CD
# ============================================================
# Pipeline :
#   1. Push sur GitHub (main ou dev)
#   2. Build automatique via Codemagic
#   3. Génération APK / IPA
# ============================================================

workflows:
  # --- Build Android (APK) ---
  android-build:
    name: Chorify Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      groups:
        - supabase  # Variables : EXPO_PUBLIC_SUPABASE_URL, EXPO_PUBLIC_SUPABASE_ANON_KEY
      vars:
        EXPO_NO_TELEMETRY: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: dev
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: TypeScript check
        script: |
          npx tsc --noEmit
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Fix Kotlin compatibility
        script: |
          # Find and replace Kotlin 1.9.24 -> 1.9.25 in ALL gradle files
          find android -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.properties" \) -exec grep -l "1.9.24" {} \; | while read f; do
            echo "Patching $f"
            sed -i '' 's/1\.9\.24/1.9.25/g' "$f"
          done
          
          # Safety net via gradle.properties
          echo "kotlin.suppressKotlinVersionCompatibilityCheck=true" >> android/gradle.properties
          
          # Verify
          echo "=== Checking Kotlin version references ==="
          grep -r "1.9.24" android/ --include="*.gradle" --include="*.properties" || echo "All patched!"
      - name: Build APK (Debug)
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true

  # --- Build iOS (Simulator) ---
  ios-build:
    name: Chorify iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      groups:
        - supabase
      vars:
        EXPO_NO_TELEMETRY: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: TypeScript check
        script: |
          npx tsc --noEmit
      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for Simulator
        script: |
          cd ios
          xcodebuild -workspace Chorify.xcworkspace \
            -scheme Chorify \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true
