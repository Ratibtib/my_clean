# ============================================================
# CHORIFY — Codemagic CI/CD
# ============================================================
# Pipeline :
#   1. Push sur GitHub (main ou dev)
#   2. Build automatique via Codemagic
#   3. Génération APK / IPA
# ============================================================

workflows:
  # --- Build Android (APK) ---
  android-build:
    name: Chorify Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      vars:
        EXPO_NO_TELEMETRY: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: dev
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: TypeScript check
        script: |
          npx tsc --noEmit
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Fix Kotlin compatibility
        script: |
          # Force Compose compiler to accept Kotlin 1.9.24
          cat >> android/build.gradle << 'PATCH'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.25"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.25"
                      force "org.jetbrains.kotlin:kotlin-reflect:1.9.25"
                  }
              }
              afterEvaluate {
                  tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                      kotlinOptions {
                          freeCompilerArgs += ["-P", "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=1.9.24"]
                      }
                  }
              }
          }
          PATCH

          echo "kotlin.suppressKotlinVersionCompatibilityCheck=true" >> android/gradle.properties

          echo "=== Patch applied ==="
      - name: Build APK (Debug)
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true

  # --- Build iOS (Simulator) ---
  ios-build:
    name: Chorify iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      vars:
        EXPO_NO_TELEMETRY: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: TypeScript check
        script: |
          npx tsc --noEmit
      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for Simulator
        script: |
          cd ios
          xcodebuild -workspace Chorify.xcworkspace \
            -scheme Chorify \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true
