workflows:
  android-build:
    name: Chorify Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      vars:
        EXPO_NO_TELEMETRY: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: dev
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: TypeScript check
        script: npx tsc --noEmit
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      - name: Build APK
        script: cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true
  ios-build:
    name: Chorify iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      vars:
        EXPO_NO_TELEMETRY: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: TypeScript check
        script: npx tsc --noEmit
      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build for Simulator
        script: cd ios && xcodebuild -workspace Chorify.xcworkspace -scheme Chorify -sdk iphonesimulator -configuration Debug -destination 'generic/platform=iOS Simulator' build
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true
